<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PixelPal Visitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas, #v-bubble { user-select: none; }
    #visitor-canvas {
      position: absolute; bottom: 0; left: 0;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    #v-bubble {
      position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(145deg, #FFF6FB 0%, #FFE9F3 100%);
      border: 2px solid #FFB7D5; border-radius: 16px; padding: 8px 14px;
      font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif; font-size: 12px;
      color: #8A4A66; max-width: 190px; text-align: center;
      box-shadow: 0 4px 12px rgba(255,150,190,0.35);
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    #v-bubble.show { opacity: 1; }
    #v-bubble::after {
      content: ''; position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent;
      border-top: 9px solid #FFB7D5;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <canvas id="visitor-canvas" width="128" height="128"></canvas>
  <div id="v-bubble" aria-live="polite" aria-atomic="true"></div>
  <script type="module" src="/src/renderer/visitor.ts"></script>
</body>
</html>
