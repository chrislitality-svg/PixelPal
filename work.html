<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可爱小宠物 · 打工</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', 'Segoe UI Rounded', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(165deg, #FFF6FB 0%, #FFEAF3 50%, #FCE4EF 100%);
      color: #6B4A5B; min-height: 100vh; padding-bottom: 24px;
    }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; padding: 14px 18px;
      background: linear-gradient(135deg, #FF8FBE, #FF6FA8); color: #fff;
      box-shadow: 0 3px 12px rgba(255,120,170,0.4);
    }
    .topbar .title { font-size: 18px; font-weight: 700; }
    .coin-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.28);
      border-radius:16px; padding:5px 14px; font-size:15px; font-weight:700; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 14px 18px 0; }

    /* Active job card */
    .active {
      background: linear-gradient(135deg, #FFE3F0, #FFD0E6);
      border: 2px solid #FF9EC2; border-radius: 18px; padding: 16px; margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(255,120,170,0.22);
    }
    .active .row { display: flex; align-items: center; gap: 12px; }
    .active .ai { font-size: 40px; }
    .active .an { font-size: 16px; font-weight: 700; color: #C13E78; }
    .active .as { font-size: 12px; color: #7A4A5A; }
    .bar-track { height: 10px; background: #FFF; border-radius: 6px; margin-top: 12px; overflow: hidden; border: 1px solid #FFC4DD; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #FF8FBE, #FF6FA8); width: 0%; transition: width 0.9s linear; }
    .active .ctrl { display:flex; align-items:center; justify-content:space-between; margin-top: 10px; }
    .countdown { font-size: 13px; font-weight: 700; color: #E0723C; font-family: 'Courier New', monospace; }
    .collect-btn {
      border:none; border-radius:12px; padding:8px 18px; font-family:inherit; font-size:13px; font-weight:700;
      color:#fff; background: linear-gradient(135deg,#8BC88B,#5BAA5B); cursor:pointer;
    }
    .collect-btn:disabled { background:#D8C8D0; cursor:not-allowed; }

    .hint { font-size: 12px; color: #7A4A5A; margin: 2px 2px 12px; }
    .cat-title { font-size: 13px; font-weight: 700; color: #D06A8E; margin: 14px 4px 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .job {
      background: rgba(255,255,255,0.8); border: 1.5px solid #FFD0E2; border-radius: 14px; padding: 10px;
      display: flex; flex-direction: column; gap: 3px; transition: transform 0.12s;
    }
    .job:hover { transform: translateY(-2px); }
    .job .ji { font-size: 26px; }
    .job .jn { font-size: 13px; font-weight: 700; color: #5A3A4A; }
    .job .jd { font-size: 10px; color: #7A4A5A; min-height: 26px; line-height: 1.4; }
    .job .jmeta { display:flex; justify-content:space-between; font-size: 11px; margin-top: 2px; }
    .job .jtime { color: #9B7FB0; }
    .job .jrew { color: #E0723C; font-weight: 700; }
    .work-btn { margin-top: 6px; border:none; border-radius:10px; padding:6px; font-family:inherit;
      font-size:12px; font-weight:700; color:#fff; background: linear-gradient(135deg,#FF8FBE,#FF6FA8); cursor:pointer; }
    .work-btn:hover { opacity: 0.9; }
    .work-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .work-btn:focus-visible, .collect-btn:focus-visible { outline: 2px solid #FF6FA8; outline-offset: 2px; }
    .toast {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px);
      background:#5A3A4A; color:#fff; padding:9px 18px; border-radius:18px; font-size:13px;
      opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; box-shadow:0 6px 18px rgba(0,0,0,.2);
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="title">🛠️ 打工赚钱</span>
    <span class="coin-badge">🪙 <span id="coin-count">…</span></span>
  </div>
  <div class="wrap">
    <div id="active-area"></div>
    <div id="job-list"></div>
  </div>
  <div class="toast" id="toast"></div>
  <script type="module" src="/src/renderer/work.ts"></script>
</body>
</html>
