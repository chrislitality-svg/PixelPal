<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelPal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Comic Sans MS', 'Segoe UI Rounded', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(165deg, #FFF6FB 0%, #FFEAF3 50%, #FCE4EF 100%);
      background-size: cover;
      background-position: center;
      color: #6B4A5B;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* When a generated background is applied, dim content cards a touch more */
    body.has-bg::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(255,246,251,0.55);
      z-index: 0;
    }
    .card-wrapper { max-width: 420px; margin: 0 auto; padding: 24px 22px 30px; position: relative; z-index: 1; }

    /* ---- Header ---- */
    .pet-header { text-align: center; margin-bottom: 18px; }
    .pet-avatar {
      width: 92px; height: 92px; margin: 0 auto 10px;
      border-radius: 50%;
      border: 3px solid #FFC4DD;
      background: #FFF0F6 center/cover no-repeat;
      box-shadow: 0 6px 18px rgba(255,150,190,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      image-rendering: pixelated;
    }
    .pet-name { font-size: 26px; font-weight: 700; color: #C13E78; letter-spacing: 1px; }
    .pet-subtitle { font-size: 12px; color: #9B5068; margin-top: 4px; }
    .temperament-chip {
      display: inline-block; margin-top: 8px;
      background: #FFF0F6; border: 1.5px solid #FFC4DD; border-radius: 14px;
      padding: 4px 12px; font-size: 12px; font-weight: 700; color: #C13E78;
    }
    .gen-avatar-btn {
      margin-top: 10px;
      background: linear-gradient(135deg, #B79CFF, #9B7FF0);
      color: #fff; border: none; border-radius: 14px;
      padding: 7px 16px; font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.06); transition: transform 0.1s, opacity 0.2s;
    }
    .gen-avatar-btn:hover { opacity: 0.92; }
    .gen-avatar-btn:active { transform: translateY(2px); box-shadow: none; }
    .gen-avatar-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .gen-avatar-btn:focus-visible { outline: 2px solid #FF6FA8; outline-offset: 3px; }

    /* ---- Sections ---- */
    .section {
      background: rgba(255,255,255,0.72);
      border: 1.5px solid #FFD0E2;
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(255,150,190,0.14);
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: #D06A8E; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title .dot { width: 7px; height: 7px; border-radius: 50%; background: #FF8FBE; display: inline-block; }

    /* ---- Pet profile ---- */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .profile-item { font-size: 12px; line-height: 1.6; color: #7A5468; }
    .profile-item .label { color: #9B5068; font-size: 10px; display: block; margin-bottom: 1px; }
    .profile-item .value { font-weight: 700; color: #6B4A5B; }
    .personality-row {
      grid-column: 1 / -1; margin-top: 6px; padding-top: 10px;
      border-top: 1px dashed #FCD7E6; font-size: 13px; color: #7A5468; line-height: 1.7; font-style: italic;
    }
    .seed-badge {
      grid-column: 1 / -1; margin-top: 8px;
      background: #FFF0F6; border: 1px dashed #FFC4DD; border-radius: 10px;
      padding: 6px 10px;       font-size: 10.5px; color: #7A4A5A; line-height: 1.6;
    }
    .seed-badge code { font-family: 'Courier New', monospace; color: #C13E78; }

    /* ---- Radar chart ---- */
    .radar-wrap { display: flex; justify-content: center; padding: 4px 0; }
    #radar-canvas { display: block; }

    /* ---- Needs bars ---- */
    .need-row { margin-bottom: 12px; }
    .need-row:last-child { margin-bottom: 0; }
    .need-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .need-name { font-size: 12px; color: #7A5468; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .need-name .icon { font-size: 14px; width: 18px; text-align: center; }
    .need-val { font-size: 11px; color: #9B5068; font-family: 'Courier New', monospace; }
    .need-track { height: 9px; background: #FBD8E6; border-radius: 5px; overflow: hidden; }
    .need-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
    .need-hunger .need-fill { background: linear-gradient(90deg, #FFD37A, #FF9F4A); }
    .need-energy .need-fill { background: linear-gradient(90deg, #8FD3E8, #4FAFD0); }
    .need-happiness .need-fill { background: linear-gradient(90deg, #FFAFC8, #FF6FA8); }
    .need-cleanliness .need-fill { background: linear-gradient(90deg, #A6E0BE, #6CCB95); }

    /* ---- Mood indicator ---- */
    .mood-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #FFF0F6; border: 1px solid #FFD0E2; border-radius: 20px;
      padding: 3px 12px 3px 8px; font-size: 12px; color: #7A5468;
    }
    .mood-badge .mood-icon { font-size: 16px; }

    /* ---- Empty state ---- */
    .empty-state { text-align: center; padding: 60px 20px; color: #8B5E6B; font-size: 14px; line-height: 2; }
    .empty-state .empty-icon { font-size: 48px; opacity: 0.5; margin-bottom: 16px; }

    /* ---- Memories (回忆录) ---- */
    .memory-row {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 7px 0; border-bottom: 1px dashed #FCE0EC;
    }
    .memory-row:last-child { border-bottom: none; }
    .memory-dot { font-size: 14px; line-height: 1.4; }
    .memory-desc { font-size: 12.5px; color: #6B4A5B; line-height: 1.5; }
    .memory-time { font-size: 10px; color: #8B5E6B; margin-top: 1px; }
    .memory-empty { font-size: 12px; color: #8B5E6B; line-height: 1.8; }

    /* ---- Footer ---- */
    .card-footer { text-align: center; font-size: 10px; color: #9B7085; letter-spacing: 1px; margin-top: 8px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #FFC4DD; border-radius: 3px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div id="status-content"><!-- Populated by JS --></div>
  </div>
  <script type="module" src="/src/renderer/status.ts"></script>
</body>
</html>
