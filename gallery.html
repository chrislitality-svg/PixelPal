<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可爱小宠物 · 成就图鉴</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', 'Segoe UI Rounded', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(165deg, #FFF6FB 0%, #FFEAF3 50%, #FCE4EF 100%);
      color: #6B4A5B; min-height: 100vh; padding-bottom: 24px;
    }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; gap: 8px; padding: 14px 18px;
      background: linear-gradient(135deg, #FF8FBE, #FF6FA8);
      box-shadow: 0 3px 12px rgba(255,120,170,0.4);
    }
    .tab {
      flex: 1; text-align: center; padding: 8px; border-radius: 12px;
      font-size: 14px; font-weight: 700; color: #fff; cursor: pointer;
      background: rgba(255,255,255,0.2); transition: background 0.15s;
      font-family: inherit; border: none;
    }
    .tab.active { background: #fff; color: #C13E78; }
    .tab:focus-visible { outline: 2px solid #FF6FA8; outline-offset: 2px; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 14px 18px 0; }
    .progress { font-size: 12px; color: #D06A8E; font-weight: 700; margin: 4px 2px 12px; }
    .cat-title { font-size: 13px; font-weight: 700; color: #D06A8E; margin: 14px 4px 8px; }

    /* Achievements */
    .ach {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.78); border: 1.5px solid #FFD0E2; border-radius: 14px;
      padding: 11px 14px; margin-bottom: 10px;
    }
    .ach.locked { opacity: 0.55; filter: grayscale(0.7); }
    .ach .ai { font-size: 26px; width: 34px; text-align: center; }
    .ach .at { flex: 1; }
    .ach .an { font-size: 14px; font-weight: 700; color: #5A3A4A; }
    .ach .ad { font-size: 11px; color: #7A4A5A; }
    .ach .ar { font-size: 12px; font-weight: 700; color: #E0723C; white-space: nowrap; }
    .ach .done { color: #2BA877; }

    /* Collection */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .breed {
      background: rgba(255,255,255,0.78); border: 1.5px solid #FFD0E2; border-radius: 14px;
      padding: 10px; display: flex; gap: 10px; align-items: center;
    }
    .breed.locked { opacity: 0.7; }
    .swatch {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.08); display:flex; align-items:center; justify-content:center;
      font-size: 18px; color: #fff;
    }
    .breed .bn { font-size: 13px; font-weight: 700; color: #5A3A4A; }
    .breed .brarity { font-size: 10px; font-weight: 700; }
    .breed .bd { font-size: 9.5px; color: #7A4A5A; line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hidden { display: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="topbar" role="tablist" aria-label="成就与图鉴">
    <button type="button" class="tab active" id="tab-ach" role="tab" aria-selected="true" aria-controls="view-ach">🏆 成就</button>
    <button type="button" class="tab" id="tab-dex" role="tab" aria-selected="false" aria-controls="view-dex">📖 图鉴</button>
  </div>
  <div class="wrap">
    <div id="view-ach" role="tabpanel" aria-labelledby="tab-ach"></div>
    <div id="view-dex" class="hidden" role="tabpanel" aria-labelledby="tab-dex"></div>
  </div>
  <script type="module" src="/src/renderer/gallery.ts"></script>
</body>
</html>
