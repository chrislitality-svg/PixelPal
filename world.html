<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PixelPal World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }
    #world-canvas {
      position: absolute;
      top: 0;
      left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="world-canvas" width="100" height="100"></canvas>
  <script type="module" src="/src/renderer/world.ts"></script>
</body>
</html>
