<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可爱小宠物 · 成长报告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', 'Segoe UI Rounded', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(165deg, #FFF6FB 0%, #FFEAF3 50%, #FCE4EF 100%);
      color: #6B4A5B; min-height: 100vh; padding-bottom: 24px;
    }
    .topbar {
      position: sticky; top: 0; z-index: 10; padding: 14px 18px;
      background: linear-gradient(135deg, #FF8FBE, #FF6FA8); color: #fff;
      font-size: 18px; font-weight: 700; box-shadow: 0 3px 12px rgba(255,120,170,0.4);
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 16px 18px 0; }
    .cat-title { font-size: 13px; font-weight: 700; color: #D06A8E; margin: 6px 2px 10px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .stat {
      background: rgba(255,255,255,0.78); border: 1.5px solid #FFD0E2; border-radius: 14px;
      padding: 12px 8px; text-align: center; box-shadow: 0 3px 10px rgba(255,150,190,0.1);
    }
    .stat .v { font-size: 20px; font-weight: 800; color: #C13E78; }
    .stat .l { font-size: 10.5px; color: #7A4A5A; margin-top: 3px; }

    .section {
      background: rgba(255,255,255,0.72); border: 1.5px solid #FFD0E2; border-radius: 18px;
      padding: 16px; margin-top: 16px; box-shadow: 0 4px 16px rgba(255,150,190,0.12);
    }
    .section-title { font-size: 13px; font-weight: 700; color: #D06A8E; margin-bottom: 10px; }
    #chart { display: block; width: 100%; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 10px; }
    .legend span { font-size: 11px; color: #7A5468; display: inline-flex; align-items: center; gap: 4px; }
    .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    .note { font-size: 11px; color: #8B5E6B; margin-top: 8px; line-height: 1.5; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="topbar">📈 成长报告</div>
  <div class="wrap" id="report-content"></div>
  <script type="module" src="/src/renderer/report.ts"></script>
</body>
</html>
